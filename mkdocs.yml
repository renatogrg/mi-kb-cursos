site_name: Mi KB - Cursos Tecnología
site_description: Knowledge Base - SEO, Cursos, Apuntes
site_author: Tu Nombre
site_url: https://github.com/tu-usuario/mi-kb-cursos

theme:
  name: material
  language: es
  features:
    - search.suggest
    - search.highlight
    - navigation.tabs
    - navigation.sections
    - toc.follow
  palette:
    - scheme: default
      toggle:
        icon: material/lightbulb-outline
        name: Modo oscuro

plugins:
  - search:
      lang: es

nav:
  - Inicio: index.md
  - SEO:
      - Conceptos Base: seo/00-conceptos-base.md
      - On-Page: seo/01-on-page.md